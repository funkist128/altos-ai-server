worker_processes auto;

events {
    worker_connections 2048;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # LLM 回應可能很長，把 body 與 timeout 放寬
    client_max_body_size 100m;
    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;

    # WebSocket / SSE upgrade
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream open_webui  { server open-webui:8081; }
    upstream router_api  { server router-api:8000; }
    upstream vllm_large  { server vllm-large:8000; }

    # 共用 proxy header (所有 location 套用)
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    # streaming / SSE 必要：關掉緩衝
    proxy_buffering off;
    proxy_cache off;

    server {
        listen 80 default_server;
        server_name _;

        # 注意: /api/ 與 /health 留給 Open WebUI 自己用 (它的後端 API 就在 /api/*)
        # 我們的 router 一律改掛在 /router/ 之下，避免覆蓋 Open WebUI 後端路徑。

        # ---- OpenAI 相容端點 (給外部 SDK / 程式呼叫) ----
        # 例: POST /v1/chat/completions、GET /v1/models
        # 不衝突: Open WebUI 自己的 OpenAI 路徑前綴是 /api/v1/，不是 /v1/
        location /v1/ {
            proxy_pass http://router_api/v1/;
        }

        # ---- Router REST API ----
        # 例: POST /router/chat、GET /router/health、GET /router/v1/models
        location /router/ {
            proxy_pass http://router_api/;
        }

        # ---- 直連後端 vLLM (debug / 壓測用) ----
        location /debug/large/ {
            proxy_pass http://vllm_large/;
        }

        # ---- 預設: Open WebUI (含它自己的 /api/* 與 /health) ----
        location / {
            proxy_pass http://open_webui;
        }
    }
}
