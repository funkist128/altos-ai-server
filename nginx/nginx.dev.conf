worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    client_max_body_size 100m;
    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream open_webui  { server open-webui:8080; }
    upstream router_api  { server router-api:8000; }
    upstream ollama_up   { server ollama:11434; }

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    proxy_buffering off;
    proxy_cache off;

    server {
        listen 80 default_server;
        server_name _;

        location /api/      { proxy_pass http://router_api/; }
        location /v1/       { proxy_pass http://router_api/v1/; }
        location = /health  { proxy_pass http://router_api/health; }
        location /ollama/   { proxy_pass http://ollama_up/; }
        location /          { proxy_pass http://open_webui; }
    }
}
